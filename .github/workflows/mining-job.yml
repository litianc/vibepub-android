name: VibePub Mining Job

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  mine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'infra/mining/package.json'

      - name: Install dependencies
        working-directory: infra/mining
        run: npm ci || npm install

      - name: Run Mining Job
        working-directory: infra/mining
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          VOLC_ASR_APPID: ${{ secrets.VOLC_ASR_APPID }}
          VOLC_ASR_ACCESS_TOKEN: ${{ secrets.VOLC_ASR_ACCESS_TOKEN }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_BASE_URL: ${{ secrets.GLM_BASE_URL }}
          GLM_MODEL: ${{ secrets.GLM_MODEL }}
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          WECHAT_PROXY: ${{ secrets.WECHAT_PROXY }}
          FILES_TOKEN: ${{ secrets.FILES_TOKEN }}
          PUBLIC_BASE_URL: "https://vibepub.litianc.cn"
        run: npm start
