name: Android Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          present=0
          for value in "$ANDROID_KEYSTORE_BASE64" "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_ALIAS" "$ANDROID_KEY_PASSWORD"; do
            if [[ -n "$value" ]]; then
              present=$((present + 1))
            fi
          done

          if [[ "$present" -eq 0 ]]; then
            echo "No Android signing secrets configured; debug APK will use the runner debug key."
            exit 0
          fi

          if [[ "$present" -ne 4 ]]; then
            echo "Android signing secrets are partially configured. Set all of ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD." >&2
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/android-signing"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-signing/vibepub.keystore"
          {
            echo "VIBEPUB_RELEASE_STORE_FILE=$RUNNER_TEMP/android-signing/vibepub.keystore"
            echo "VIBEPUB_RELEASE_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "VIBEPUB_RELEASE_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "VIBEPUB_RELEASE_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> android/gradle.properties
          echo "Configured stable Android signing for internal APKs."

      - name: Run automated tests
        run: gradle -p android :app:testDebugUnitTest

      - name: Build debug APK
        run: gradle -p android :app:assembleDebug

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: android/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibepub-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Generate Tag Name (For Internal Builds)
        if: github.event_name == 'workflow_dispatch'
        id: internal_tag
        run: echo "tag_name=build-$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create Internal Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.internal_tag.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: "Internal Build ${{ steps.internal_tag.outputs.tag_name }}"
          generate_release_notes: true
          files: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Official Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: android/app/build/outputs/apk/debug/app-debug.apk
