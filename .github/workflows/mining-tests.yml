name: Mining Tests

on:
  pull_request:
    paths:
      - "infra/mining/**"
      - ".github/workflows/mining-tests.yml"
  push:
    branches:
      - main
    paths:
      - "infra/mining/**"
      - ".github/workflows/mining-tests.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/mining

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "infra/mining/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test
