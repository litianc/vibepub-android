name: Smoke External Services

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check GLM chat completions
        env:
          GLM_BASE_URL: ${{ secrets.GLM_BASE_URL }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_MODEL: ${{ secrets.GLM_MODEL }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          url = os.environ["GLM_BASE_URL"].rstrip("/") + "/chat/completions"
          payload = {
              "model": os.environ.get("GLM_MODEL") or "glm-5.2",
              "messages": [{"role": "user", "content": "请只输出一行：OK"}],
              "temperature": 0,
              "max_tokens": 64,
              "thinking": {"type": "disabled"},
          }
          req = urllib.request.Request(
              url,
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {os.environ['GLM_API_KEY']}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              data = json.loads(resp.read().decode("utf-8", "replace"))
          content = ((data.get("choices") or [{}])[0].get("message") or {}).get("content")
          if content != "OK":
              raise SystemExit(f"Unexpected GLM response: {content!r}")
          print("GLM smoke check passed")
          PY

      - name: Check Volcengine ASR credentials
        env:
          VOLC_ASR_APPID: ${{ secrets.VOLC_ASR_APPID }}
          VOLC_ASR_ACCESS_TOKEN: ${{ secrets.VOLC_ASR_ACCESS_TOKEN }}
          VOLC_ASR_RESOURCE_ID: ${{ secrets.VOLC_ASR_RESOURCE_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import uuid
          import urllib.error
          import urllib.request
          import base64

          # We don't need resource_id for v1, but we use the appid and token
          appid = os.environ["VOLC_ASR_APPID"]
          token = os.environ["VOLC_ASR_ACCESS_TOKEN"]

          # Create a dummy 1-second silent PCM audio or just a tiny payload
          # For v1 ASR, we need to send a valid base64 payload.
          # Here we just send a very short 16kHz 16-bit PCM silent buffer
          silent_pcm = b'\x00' * 32000
          b64_audio = base64.b64encode(silent_pcm).decode('utf-8')

          payload = {
              "app": {
                  "appid": appid,
                  "token": token,
                  "cluster": "volcengine_input_common"
              },
              "user": {
                  "uid": "smoke_test"
              },
              "audio": {
                  "format": "wav",
                  "rate": 16000,
                  "language": "zh-CN",
                  "bits": 16,
                  "channel": 1,
                  "codec": "raw"
              },
              "request": {
                  "reqid": str(uuid.uuid4()),
                  "text": "",
                  "sequence": 1,
                  "action": 1
              },
              "payload": b64_audio
          }

          req = urllib.request.Request(
              "https://openspeech.bytedance.com/api/v1/asr",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer; {token}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  body = resp.read().decode("utf-8", "replace")
                  data = json.loads(body)
                  code = data.get("code")
                  if code == 1000:
                      print("Volcengine ASR v1 endpoint reachable and authorized.")
                  else:
                      raise SystemExit(f"Volcengine ASR v1 failed with code {code}: {body}")
          except urllib.error.HTTPError as error:
              body = error.read().decode("utf-8", "replace")
              raise SystemExit(f"Volcengine ASR v1 HTTP {error.code}: {body}")
          PY
