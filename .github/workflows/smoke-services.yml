name: Smoke External Services

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Check GLM chat completions
        env:
          GLM_BASE_URL: ${{ secrets.GLM_BASE_URL }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM_MODEL: ${{ secrets.GLM_MODEL }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          url = os.environ["GLM_BASE_URL"].rstrip("/") + "/chat/completions"
          payload = {
              "model": os.environ.get("GLM_MODEL") or "glm-5.2",
              "messages": [{"role": "user", "content": "请只输出一行：OK"}],
              "temperature": 0,
              "max_tokens": 64,
              "thinking": {"type": "disabled"},
          }
          req = urllib.request.Request(
              url,
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {os.environ['GLM_API_KEY']}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              data = json.loads(resp.read().decode("utf-8", "replace"))
          content = ((data.get("choices") or [{}])[0].get("message") or {}).get("content")
          if content != "OK":
              raise SystemExit(f"Unexpected GLM response: {content!r}")
          print("GLM smoke check passed")
          PY

      - name: Install mining dependencies
        working-directory: infra/mining
        run: npm ci

      - name: Check Volcengine BigModel ASR v3 credentials
        working-directory: infra/mining
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          VOLC_ASR_APPID: ${{ secrets.VOLC_ASR_APPID }}
          VOLC_ASR_ACCESS_TOKEN: ${{ secrets.VOLC_ASR_ACCESS_TOKEN }}
          VOLC_ASR_RESOURCE_ID: ${{ secrets.VOLC_ASR_RESOURCE_ID }}
          VOLC_ASR_SMOKE_AUDIO_URL: ${{ secrets.VOLC_ASR_SMOKE_AUDIO_URL }}
          VOLC_ASR_SMOKE_R2_KEY: ${{ secrets.VOLC_ASR_SMOKE_R2_KEY || 'inbox/speaker_boundary_18_48s.mp3' }}
          VOLC_ASR_SMOKE_AUDIO_FORMAT: ${{ secrets.VOLC_ASR_SMOKE_AUDIO_FORMAT || 'mp3' }}
        run: npm run smoke:asr

      - name: Check WeChat Proxy and Token
        if: always()
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          WECHAT_PROXY: ${{ secrets.WECHAT_PROXY }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          import urllib.error

          appid = os.environ.get("WECHAT_APP_ID")
          secret = os.environ.get("WECHAT_APP_SECRET")
          proxy = os.environ.get("WECHAT_PROXY")

          if not appid or not secret or not proxy:
              print("Skipping WeChat smoke check due to missing secrets")
              raise SystemExit(0)

          proxy = proxy.rstrip("/")
          url = f"{proxy}/cgi-bin/token?grant_type=client_credential&appid={appid}&secret={secret}"

          try:
              with urllib.request.urlopen(url, timeout=30) as resp:
                  body = resp.read().decode("utf-8", "replace")
                  data = json.loads(body)
                  if "access_token" in data:
                      print("WeChat proxy reachable and token acquired.")
                  else:
                      raise SystemExit(f"WeChat token failed: {body}")
          except urllib.error.HTTPError as error:
              body = error.read().decode("utf-8", "replace")
              raise SystemExit(f"WeChat proxy HTTP {error.code}: {body}")
          except urllib.error.URLError as error:
              raise SystemExit(f"WeChat proxy connection failed: {error.reason}")
          PY
