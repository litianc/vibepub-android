name = "vibepub-api"
main = "src/index.ts"
compatibility_date = "2026-06-24"

routes = [
  { pattern = "vibepub.litianc.cn", custom_domain = true }
]

[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "vibepub-files"

[vars]
PUBLIC_BASE_URL = "https://vibepub.litianc.cn"
GITHUB_WORKFLOW_REF = "main"

[[d1_databases]]
binding = "DB"
database_name = "vibepub-db"
database_id = "0804a462-4413-4eaf-bfab-60531eef06be"
